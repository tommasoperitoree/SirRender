name: Deploy Dokka Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '*.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4        # v4 is still current stable for checkout

      - name: Set up JDK 21
        uses: actions/setup-java@v4      # Java action, not affected by Node.js runtime
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Dokka
        run: ./gradlew :dokkaGenerateHtml --configuration-cache

      - name: Setup Pages
        uses: actions/configure-pages@v5  # no Node 24 version available yet

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3  # no Node 24 version available yet

        with:
          path: 'build/dokka/html'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4    # no Node 24 version available yet

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← opt in now, silences the warning