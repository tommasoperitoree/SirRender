name: Deploy Dokka Documentation

on:
  push:
    branches: [ main ]
    paths: # Only run if relevant files changed
      - 'src/**'
      - '*.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:                # Allow manual trigger from GitHub UI

concurrency: # Cancel in-flight runs if you push again quickly
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # v5 doesn't exist yet, v4 is current stable

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # same here
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Dokka
        run: ./gradlew :dokkaGenerateHtml --configuration-cache

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/dokka/html'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4